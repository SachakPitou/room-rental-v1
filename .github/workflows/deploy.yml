name: Deploy to A2 Hosting

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Test ──────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: room_rental_test
          MYSQL_ROOT_PASSWORD: secret
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, gd, bcmath

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: room_rental_test
          DB_USERNAME: root
          DB_PASSWORD: secret

      - name: Run tests
        run: php artisan test
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: room_rental_test
          DB_USERNAME: root
          DB_PASSWORD: secret

  # ── Job 2: Deploy ────────────────────────────
  deploy:
    name: Deploy to A2 Hosting
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node & build assets
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend assets
        run: |
          npm install
          npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.A2_HOST }}
          username: ${{ secrets.A2_USER }}
          key: ${{ secrets.A2_PRIVATE_KEY }}
          port: ${{ secrets.A2_PORT }}
          script: |
            cd ~/room-rental
            
            # 1. Pull latest code
            git pull origin main
            
            # 2. Install dependencies (WITHOUT Pail/Dev tools)
            composer install --no-dev --optimize-autoloader --no-interaction
            
            # 3. CRITICAL: Manually delete "ghost" caches that cause 500 errors
            # This works even if artisan is crashing.
            rm -f bootstrap/cache/config.php
            rm -f bootstrap/cache/services.php
            rm -f bootstrap/cache/packages.php
            rm -f bootstrap/cache/routes-v7.php
            
            # 4. Standard Laravel Optimization
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            echo "✅ Deployment Successful at $(date)"
version: '3.8'

services:

  app:
    build: .
    container_name: room_rental_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - room_rental_net
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: room_rental_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - room_rental_net
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: room_rental_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: room_rental
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - room_rental_net

networks:
  room_rental_net:

volumes:
  db_data: